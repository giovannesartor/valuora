<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="1000" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="15" y1="80" x2="85" y2="15" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="glow" x1="50" y1="15" x2="50" y2="85" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#047857" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Background square -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Glow -->
  <ellipse cx="50" cy="40" rx="35" ry="22" fill="url(#glow)"/>
  <!-- Bars -->
  <rect x="18" y="62" width="11" height="18" rx="3" fill="url(#accent)" opacity="0.45"/>
  <rect x="33" y="50" width="11" height="30" rx="3" fill="url(#accent)" opacity="0.65"/>
  <rect x="48" y="36" width="11" height="44" rx="3" fill="url(#accent)" opacity="0.85"/>
  <rect x="63" y="20" width="11" height="60" rx="3" fill="url(#accent)"/>
  <!-- Trend line -->
  <path d="M22 68 L38 53 L54 39 L71 22" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Arrow head -->
  <path d="M63 20 L74 20 L74 31" stroke="white" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
