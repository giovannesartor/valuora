<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none">
  <defs>
    <linearGradient id="logoBg" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="logoAccent" x1="8" y1="38" x2="40" y2="8" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="logoGlow" x1="24" y1="8" x2="24" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#60a5fa" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2563eb" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="60" y1="10" x2="240" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <!-- Icon -->
  <rect width="48" height="48" rx="12" fill="url(#logoBg)"/>
  <ellipse cx="24" cy="20" rx="16" ry="10" fill="url(#logoGlow)"/>
  <rect x="10" y="30" width="5" height="8" rx="1.5" fill="url(#logoAccent)" opacity="0.45"/>
  <rect x="17" y="24" width="5" height="14" rx="1.5" fill="url(#logoAccent)" opacity="0.65"/>
  <rect x="24" y="17" width="5" height="21" rx="1.5" fill="url(#logoAccent)" opacity="0.85"/>
  <rect x="31" y="10" width="5" height="28" rx="1.5" fill="url(#logoAccent)"/>
  <path d="M12 34 L19.5 27 L26.5 20 L33.5 12" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M30 10 L36 10 L36 16" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Text: QUANTO VALE -->
  <text x="58" y="22" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="15" font-weight="800" letter-spacing="0.5" fill="url(#textGrad)">QUANTO</text>
  <text x="58" y="40" font-family="Inter, system-ui, -apple-system, sans-serif" font-size="15" font-weight="800" letter-spacing="0.5" fill="url(#logoAccent)">VALE</text>
