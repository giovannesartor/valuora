<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: 'Inter', Arial, sans-serif; margin: 0; padding: 0; background: #f8f9fa; }
  .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 40px 32px; text-align: center; }
  .header h1 { color: #ffffff; font-size: 28px; margin: 0; }
  .header p { color: #94a3b8; font-size: 14px; margin: 8px 0 0; }
  .content { padding: 40px 32px; }
  .content h2 { color: #0f172a; font-size: 22px; margin: 0 0 16px; }
  .content p { color: #475569; font-size: 15px; line-height: 1.7; margin: 0 0 16px; }
  .highlight { background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 20px; text-align: center; margin: 20px 0; }
  .highlight .amount { font-size: 32px; font-weight: 700; color: #16a34a; }
  .highlight .plan-name { font-size: 14px; color: #475569; margin-top: 4px; }
  .footer { padding: 24px 32px; background: #f1f5f9; text-align: center; }
  .footer p { color: #94a3b8; font-size: 12px; margin: 4px 0; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Quanto Vale</h1>
    <p>Pagamento confirmado <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" style="display:inline;vertical-align:middle;margin-left:4px"><polyline points="20 6 9 17 4 12"/></svg></p>
  </div>
  <div class="content">
    <h2>Pagamento recebido!</h2>
    <p>Olá, {{ name }}. Seu pagamento foi processado com sucesso.</p>
    <div class="highlight">
      <div class="amount">{{ amount }}</div>
      <div class="plan-name">Plano {{ plan }}</div>
    </div>
    <p>Seu relatório está sendo gerado e será enviado por e-mail em instantes.</p>
  </div>
  <div class="footer">
    <p><strong>Quanto Vale</strong> — Descubra quanto sua empresa vale hoje.</p>
    <p>{{ contact_email }}</p>
  </div>
</div>
</body>
</html>
