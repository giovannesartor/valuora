<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body { font-family: 'Inter', Arial, sans-serif; margin: 0; padding: 0; background: #f8f9fa; }
  .container { max-width: 600px; margin: 0 auto; background: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
  .header { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); padding: 40px 32px; text-align: center; }
  .header h1 { color: #ffffff; font-size: 28px; margin: 0; }
  .header p { color: #94a3b8; font-size: 14px; margin: 8px 0 0; }
  .content { padding: 40px 32px; }
  .content h2 { color: #0f172a; font-size: 22px; margin: 0 0 16px; }
  .content p { color: #475569; font-size: 15px; line-height: 1.7; margin: 0 0 16px; }
  .btn { display: inline-block; background: #2563eb; color: #ffffff !important; padding: 14px 32px; border-radius: 8px; text-decoration: none; font-weight: 600; font-size: 15px; margin: 16px 0; }
  .version-badge { display: inline-block; background: #dbeafe; color: #2563eb; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600; }
  .footer { padding: 24px 32px; background: #f1f5f9; text-align: center; }
  .footer p { color: #94a3b8; font-size: 12px; margin: 4px 0; }
  .divider { height: 1px; background: #e2e8f0; margin: 24px 0; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>Quanto Vale</h1>
    <p>Atualização de relatório</p>
  </div>
  <div class="content">
    <h2>Nova versão disponível!</h2>
    <p>Olá, {{ name }}. Uma nova versão do relatório de <strong>{{ company_name }}</strong> foi gerada.</p>
    <p><span class="version-badge">Versão {{ version }}</span></p>
    <div style="text-align: center;">
      <a href="{{ download_url }}" class="btn">Baixar Nova Versão</a>
    </div>
    <div class="divider"></div>
    <p style="font-size: 13px; color: #94a3b8;">Este link expira em 48 horas.</p>
  </div>
  <div class="footer">
    <p><strong>Quanto Vale</strong> — Descubra quanto sua empresa vale hoje.</p>
    <p>{{ contact_email }}</p>
  </div>
</div>
</body>
</html>
